# A GD&T-invalid drawing: a position tolerance whose related_dimension_ids
# points to dim-2, a dimension that is basic and not a reference
# dimension -- it would pass position-related-dimension-must-be-basic
# and related-dimension-must-not-be-reference -- but whose declared
# role is size, not location. position-related-dimension-must-be-location
# (Sprint 10) is the one rule this violates.
id: dwg-006
title: Bracket Arm
number: DWG-1010
revision: A
default_unit: mm

datums:
  - label: A
    feature_type: plane

features:
  - id: feat-hole-1
    feature_type: hole
    name: Locating hole
    feature_of_size: true
    dimensions:
      - id: dim-1
        dimension_type: diameter
        nominal_value: 8.0
        unit: mm
        tolerance:
          upper_deviation: 0.05
          lower_deviation: 0.05
        role: size
      - id: dim-2
        dimension_type: linear
        nominal_value: 30.0
        unit: mm
        role: size
    feature_control_frames:
      - id: fcf-1
        characteristic: position
        tolerance:
          upper_deviation: 0.2
          lower_deviation: 0.2
          zone_shape: cylindrical
        datum_references:
          - datum_label: A
        related_dimension_ids:
          - dim-2
