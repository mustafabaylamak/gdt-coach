# A GD&T-valid drawing: a position tolerance with a full three-datum
# reference frame, no duplicate datum references, and no projected
# tolerance zone on a non-position characteristic. Also demonstrates
# correct use of the Sprint 8-10 dimension-linkage fields: the position
# FCF's related_dimension_ids points to dim-2, a basic dimension
# explicitly marked role: location; the hole's own diameter (dim-1) is
# marked role: size. Running the full rule set against this drawing
# produces zero findings.
id: dwg-001
title: Mounting Bracket
number: DWG-1001
revision: A
default_unit: mm
scale: "1:1"

datums:
  - label: A
    feature_type: plane
  - label: B
    feature_type: plane
  - label: C
    feature_type: plane

features:
  - id: feat-hole-1
    feature_type: hole
    name: Mounting hole
    quantity: 4
    feature_of_size: true
    dimensions:
      - id: dim-1
        dimension_type: diameter
        nominal_value: 10.0
        unit: mm
        tolerance:
          upper_deviation: 0.05
          lower_deviation: 0.05
        role: size
      - id: dim-2
        dimension_type: linear
        nominal_value: 40.0
        unit: mm
        role: location
    feature_control_frames:
      - id: fcf-1
        characteristic: position
        tolerance:
          upper_deviation: 0.25
          lower_deviation: 0.25
          zone_shape: cylindrical
          material_condition: mmc
        datum_references:
          - datum_label: A
          - datum_label: B
          - datum_label: C
        related_dimension_ids:
          - dim-2
